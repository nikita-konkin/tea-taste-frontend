services:
  tea-frontend:
    container_name: tea-frontend
    # CI pushes this image; `docker compose pull && up -d` deploys it.
    # `up -d --build` still builds from source when needed.
    image: nikita8konkin/tea-taste-frontend:latest
    build:
      context: .
      args:
        - REACT_APP_API_URL=https://teaform.ru/api
    restart: unless-stopped
    # ports:
    #   - 8081:80
    #   - 443:443
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - mynetwork

networks:
  mynetwork:
    external: true